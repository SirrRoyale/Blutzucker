<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blutzucker Simulation 2.0</title>
  <link rel="stylesheet" href="style.css">
  <!-- Using Chart.js 4.x UMD Bundle (No Module) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
</head>

<body>
  <!-- Start Screen Overlay -->
  <div id="startScreen" class="start-overlay">
    <div class="glass-panel start-card">
      <h1>Willkommen zur Blutzucker Sim 2.0</h1>
      <p>Bitte wähle deinen Körpertyp für die Simulation:</p>
      <div class="body-type-grid">
        <button class="body-type-btn" data-type="sporty" data-rate="-5">
          <span class="icon">🏃</span>
          <span class="label">Sportlich</span>
          <span class="detail">-5 mg/dL pro Std.</span>
        </button>
        <button class="body-type-btn" data-type="healthy" data-rate="-3">
          <span class="icon">🥗</span>
          <span class="label">Gesund</span>
          <span class="detail">-3 mg/dL pro Std.</span>
        </button>
        <button class="body-type-btn" data-type="overweight" data-rate="-1.5">
          <span class="icon">🍔</span>
          <span class="label">Übergewichtig</span>
          <span class="detail">-1.5 mg/dL pro Std.</span>
        </button>
        <button class="body-type-btn" data-type="t2" data-rate="-1">
          <span class="icon">💊</span>
          <span class="label">Diabetes Typ 2</span>
          <span class="detail">-1 mg/dL pro Std.</span>
        </button>
        <button class="body-type-btn" data-type="t1" data-rate="2">
          <span class="icon">💉</span>
          <span class="label">Diabetes Typ 1</span>
          <span class="detail">+2 mg/dL pro Std.</span>
        </button>
      </div>
    </div>
  </div>

  <div class="dashboard-container blur-background">
    <!-- Header Section: Stats & Time & Controls & Log -->
    <header class="glass-panel header-panel">
      <div class="header-left">
        <div class="title-section">
          <h1>Blutzucker Simulator</h1>
          <p class="subtitle">Interaktives 24h Modell</p>
          <div id="healthStatus" class="health-status">OK</div>
        </div>

        <div class="header-controls">
          <div id="bodyTypeDisplay" class="body-type-badge">
            <span class="icon">?</span>
            <span class="text">--</span>
          </div>
          <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Theme">
            <span class="sun">☀️</span>
            <span class="moon">🌙</span>
          </button>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-label">Zeit</span>
            <span class="stat-value" id="timeDisplay">08:00</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Blutzucker</span>
            <span class="stat-value" id="bgDisplay">--</span>
            <span class="stat-unit">mg/dL</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">IOB</span>
            <span class="stat-value" id="iobDisplay">0.0</span>
            <span class="stat-unit">IE</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">COB</span>
            <span class="stat-value" id="cobDisplay">0</span>
            <span class="stat-unit">g</span>
          </div>
        </div>
      </div>

      <div class="header-right">
        <!-- Card: Steuerung -->
        <div class="header-card control-card-small">
          <h3>⚙️ Steuerung</h3>
          <div class="simulation-controls">
            <button id="nextHourBtn" class="sim-btn">Next Hour (+1h)</button>
            <div class="auto-run-group">
              <button id="autoRunBtn" class="sim-btn secondary">Auto-Run</button>
              <input type="range" id="speedSlider" min="10" max="500" value="100" title="Tempo">
            </div>
            <button id="resetBtn" class="sim-btn danger">Reset</button>
          </div>
        </div>

        <!-- Card: Logbuch -->
        <div class="header-card log-card-header">
          <h3>📝 Logbuch</h3>
          <ul id="eventLog">
            <!-- Events will be added here -->
          </ul>
        </div>
      </div>
    </header>

    <!-- Main Dashboard Grid (2 Columns on Desktop) -->
    <div class="dashboard-main-grid">

      <!-- Left Column: Actions -->
      <div class="side-panel left-panel">
        <!-- Card 1: Essen -->
        <div class="control-card">
          <h3>🍎 Essen</h3>
          <div class="control-group">
            <label for="carbsInput">Kohlenhydrate (g)</label>
            <div class="input-wrapper">
              <input type="range" id="carbsSlider" min="0" max="100" step="5" value="0">
              <input type="number" id="carbsInput" min="0" max="200" value="0">
            </div>
            <button id="eatBtn" class="action-btn eat">Essen</button>
          </div>
        </div>

        <!-- Card 2: Insulin -->
        <div class="control-card">
          <h3>💉 Insulin</h3>
          <div class="control-group">
            <label for="insulinInput">Insulin (IE)</label>
            <div class="input-wrapper">
              <input type="range" id="insulinSlider" min="0" max="20" step="0.5" value="0">
              <input type="number" id="insulinInput" min="0" max="50" step="0.5" value="0">
            </div>
            <button id="injectBtn" class="action-btn inject">Spritzen</button>
          </div>
        </div>
      </div>

      <!-- Right Column: Chart -->
      <section class="glass-panel chart-panel center-panel">
        <canvas id="bgChart"></canvas>
        <div id="deathOverlay" class="death-overlay hidden">
          <div class="death-card">
            <h2 id="deathMessage">DU BIST TOT</h2>
            <p>Dein Blutzucker ist entgleist.</p>
            <div class="death-controls">
              <button id="respawnBtn" class="sim-btn restart-btn">🔄 Neustart</button>
              <button id="reviveBtn" class="sim-btn revive-btn">🧪 Notfall-Spritze (Revive)</button>
            </div>
          </div>
        </div>
      </section>

    </div>
  </div>

  <!-- Removed type="module" to allow file:// access and UMD compatibility -->
  <script src="script.js" defer></script>
</body>

</html>
