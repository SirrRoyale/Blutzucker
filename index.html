<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blutzucker Simulation</title>
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      const theme = localStorage.getItem('sim_theme');
      if (theme === 'dark') document.documentElement.classList.add('dark-mode');
      document.addEventListener('DOMContentLoaded', () => {
        if (theme === 'dark') document.body.classList.add('dark-mode');
      });
    })();
  </script>
</head>

<body>
  <!-- Launcher / Main Menu -->
  <div id="mainMenu" class="start-overlay">
    <div class="achievement-top-left">
      <button id="openAchievementsBtn" class="account-trigger">
        <div class="user-avatar">🏆</div>
        <span class="achievement-count-preview">--</span>
      </button>
    </div>
    <div class="account-top-right">
      <button id="openAccountBtn" class="account-trigger">
        <span class="user-name-preview">Nicht angemeldet</span>
        <div class="user-avatar small-avatar" id="topNavAvatar">👤</div>
      </button>
    </div>

    <!-- 1. Main Menu State -->
    <div id="mainMenuCard" class="glass-panel start-card">
      <h1>Blutzucker Simulation</h1>
      <div class="menu-btn-group">
        <button id="startGameBtn" class="sim-btn menu-large-btn">🎮 START</button>
        <button id="openSettingsBtn" class="sim-btn menu-large-btn secondary">⚙️ Einstellungen</button>
      </div>
    </div>

    <!-- 2. Mode Selection State -->
    <div id="modeSelection" class="glass-panel start-card hidden">
      <div class="card-header">
        <h1>Modus Wählen</h1>
        <button id="backToMainFromMode" class="close-btn">↩️</button>
      </div>
      <div class="menu-btn-group">
        <button id="startArcade" class="sim-btn menu-large-btn">🕹️ Arcade</button>
        <button id="startStory" class="sim-btn menu-large-btn">📖 Story Mode</button>
      </div>
    </div>

    <!-- 3. Story Level Selection -->
    <div id="storySelection" class="glass-panel start-card hidden">
      <div class="card-header">
        <h1>Story Levels</h1>
        <button id="backToModeFromStory" class="close-btn">↩️</button>
      </div>
      <div class="story-grid">
        <button class="story-lvl-btn" data-level="1">
          <span class="lvl-num">1</span>
          <span class="lvl-title">Grundlagen</span>
        </button>
        <button class="story-lvl-btn" data-level="2">
          <span class="lvl-num">2</span>
          <span class="lvl-title">Mahlzeiten</span>
        </button>
        <button class="story-lvl-btn" data-level="3">
          <span class="lvl-num">3</span>
          <span class="lvl-title">Sport</span>
        </button>
        <button class="story-lvl-btn" data-level="4">
          <span class="lvl-num">4</span>
          <span class="lvl-title">Disziplin</span>
        </button>
        <button class="story-lvl-btn" data-level="5">
          <span class="lvl-num">5</span>
          <span class="lvl-title">Der Marathon</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Shared Overlays (Settings, Achievements, Auth, Profile) -->
  <!-- [SETTINGS] -->
  <div id="settingsMenu" class="start-overlay hidden">
    <div class="glass-panel start-card">
      <h1>Einstellungen</h1>
      <div class="settings-content">
        <div class="settings-group">
          <label>Darstellung</label>
          <div class="theme-toggle-container">
            <button id="themeToggle" class="large-toggle">
              <span class="sun">☀️ Hell</span>
              <span class="moon">🌙 Dunkel</span>
            </button>
          </div>
        </div>
      </div>
      <button id="closeSettingsBtn" class="sim-btn restart-btn">Schließen</button>
    </div>
  </div>

  <!-- [ACHIEVEMENTS] -->
  <div id="achievementsMenu" class="start-overlay hidden">
    <div class="glass-panel start-card profile-card">
      <div class="card-header">
        <h1>🏆 Erfolge</h1>
        <button id="closeAchievementsBtn" class="close-btn">×</button>
      </div>
      <div class="achievements-list" id="achievementsList"></div>
      <div class="profile-actions">
        <button id="closeAchievementsBtnBottom" class="sim-btn">Schließen</button>
      </div>
    </div>
  </div>

  <!-- [AUTH] -->
  <div id="authMenu" class="start-overlay hidden">
    <div class="glass-panel start-card auth-card">
      <h1 id="authTitle">Anmelden</h1>
      <div class="auth-tabs">
        <button id="showLoginTab" class="auth-tab active">Login</button>
        <button id="showRegisterTab" class="auth-tab">Registrieren</button>
      </div>
      <form id="authForm" class="auth-form">
        <input type="email" id="authEmail" placeholder="Email" required>
        <input type="password" id="authPassword" placeholder="Passwort" required>
        <button type="submit" id="authSubmitBtn" class="sim-btn menu-large-btn">Bestätigen</button>
      </form>
      <button id="closeAuthBtn" class="sim-btn restart-btn secondary">Abbrechen</button>
    </div>
  </div>

  <!-- [PROFILE] -->
  <div id="profileMenu" class="start-overlay hidden">
    <div class="glass-panel start-card profile-card">
      <div class="profile-header">
        <button id="openAccSettingsBtn" class="gear-btn" title="Kontoeinstellungen">⚙️</button>
        <div class="avatar-container">
          <label for="avatarInput" class="avatar-label" title="Profilbild ändern">
            <div class="user-avatar large" id="profileAvatar">👤</div>
            <div class="avatar-overlay">📷</div>
          </label>
          <button id="removeAvatarBtn" class="avatar-remove-btn" title="Bild entfernen">×</button>
        </div>
        <input type="file" id="avatarInput" accept="image/*" class="hidden">
        <div class="user-name-row">
          <h1 id="profileUsername">Benutzerprofil</h1>
        </div>
        <p id="profileEmail" class="subtitle"></p>
      </div>
      <div class="profile-stats-row">
        <div class="p-stat"><span class="p-label">Sims</span><span id="pSimCount" class="p-value">0</span></div>
        <div class="p-stat"><span class="p-label">Best</span><span id="pBestGrade" class="p-value">--</span></div>
      </div>
      <div class="profile-history">
        <h3>Historie</h3>
        <div id="historyList" class="history-list"></div>
      </div>
      <div class="profile-actions">
        <button id="logoutBtn" class="sim-btn danger">Abmelden</button>
        <button id="closeProfileBtn" class="sim-btn restart-btn">Schließen</button>
      </div>
    </div>
  </div>

  <!-- [ACCOUNT SETTINGS] -->
  <div id="accSettingsMenu" class="start-overlay hidden">
    <div class="glass-panel start-card auth-card">
      <h1>Kontoeinstellungen</h1>
      <div class="auth-form">
        <div class="settings-group">
          <label>Benutzername</label>
          <input type="text" id="setNewUsername" placeholder="Neuer Name">
        </div>
        <div class="settings-group">
          <label>Passwort ändern</label>
          <input type="password" id="setNewPassword" placeholder="Neues Passwort (optional)">
        </div>
        <div class="menu-btn-group" style="margin-top: 20px;">
          <button id="saveAccSettingsBtn" class="sim-btn">Speichern</button>
          <button id="closeAccSettingsBtn" class="sim-btn secondary">Abbrechen</button>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
