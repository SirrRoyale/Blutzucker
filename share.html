<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erfolg geteilt! - Blutzucker Simulation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .share-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body.dark-mode .share-container {
            background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
        }

        .share-card {
            text-align: center;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .share-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom: 10px;
        }

        .share-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .share-title {
            font-size: 2.2rem;
            color: var(--accent-color);
            margin: 0;
            font-weight: 800;
        }

        .share-text {
            font-size: 1.25rem;
            opacity: 0.9;
            line-height: 1.6;
            margin: 0;
        }

        #lvlName {
            display: block;
            margin-top: 10px;
            font-size: 1.4rem;
            color: var(--accent-color);
            font-weight: 800;
        }

        body.dark-mode .share-avatar {
            border-color: #333;
        }
    </style>
    <script>
        (function () {
            const theme = localStorage.getItem('sim_theme');
            if (theme === 'dark') document.documentElement.classList.add('dark-mode');

            document.addEventListener('DOMContentLoaded', () => {
                if (theme === 'dark') document.body.classList.add('dark-mode');

                const params = new URLSearchParams(window.location.search);
                const user = params.get('u') || 'Ein Spieler';
                const lvlNum = params.get('l') || '?';
                const title = params.get('t') || 'ein Level';
                const avatarData = params.get('a');

                document.getElementById('userName').textContent = user;
                document.getElementById('lvlName').textContent = `Level ${lvlNum}: ${title}`;

                const avatarEl = document.getElementById('userAvatar');
                if (avatarData && avatarData.startsWith('data:image')) {
                    avatarEl.innerHTML = `<img src="${avatarData}" alt="Avatar">`;
                } else {
                    avatarEl.textContent = user.charAt(0).toUpperCase();
                }
            });
        })();
    </script>
</head>

<body>
    <div class="share-container">
        <div class="glass-panel share-card">
            <div id="userAvatar" class="share-avatar">👤</div>
            <h1 class="share-title">Erfolg geteilt!</h1>
            <p class="share-text">
                <strong id="userName">...</strong> hat gerade <br>
                <span id="lvlName">...</span> <br>
                im Blutzucker Simulator gemeistert! 💉🔥
            </p>
            <button onclick="window.location.href='index.html'" class="sim-btn" style="margin-top: 20px;">Jetzt selbst
                spielen</button>
        </div>
    </div>
</body>

</html>
